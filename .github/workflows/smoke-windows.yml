name: smoke-windows

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        profile:
          - minimal
          - systems
          - proofs

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install Z3 Prover on Windows Host
        if: matrix.profile == 'proofs'
        run: choco install z3 -y

      # - name: Provision WSL (Ubuntu)
      #   uses: Vampire/setup-wsl@v7
      #   with:
      #     distribution: Ubuntu-22.04
      #     wsl-version: 2

      # - name: Install dependencies in WSL
      #   shell: powershell
      #   run: |
      #     wsl sudo apt-get update
      #     wsl sudo apt-get install -y clang llvm bpftrace z3

      - name: Fetch vault branch
        run: git fetch --depth=1 origin vault:vault

      - run: npm ci --legacy-peer-deps

      - name: Run native smoke profile
        shell: powershell
        run: |
          $env:LOOM_CHROME_PATH = "${{ steps.setup-chrome.outputs.chrome-path }}"
          npm run smoke -- --profile ${{ matrix.profile }}

      # - name: Configure note for WSL container tests
      #   shell: powershell
      #   run: |
      #     git checkout vault
      #     $content = Get-Content "Smoke Suite.md" -Raw
      #     $frontmatter = "---\r\nloom-container: wsl-test\r\n---\r\n\r\n"
      #     Set-Content -Path "Smoke Suite.md" -Value ($frontmatter + $content) -NoNewline
      #     git config user.name "github-actions"
      #     git config user.email "github-actions@github.com"
      #     git commit -am "Prepend container frontmatter"
      #     git checkout -f -

      # - name: Run WSL container smoke tests (Systems & Proofs)
      #   shell: powershell
      #   run: |
      #     $env:LOOM_CHROME_PATH = "${{ steps.setup-chrome.outputs.chrome-path }}"
      #     npm run smoke -- --profile systems --require-pdf --require-all
      #     npm run smoke -- --profile proofs --require-pdf --require-all

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loom-smoke-windows-artifacts-${{ matrix.profile }}
          path: .loom/artifacts/smoke/${{ matrix.profile }}
