name: smoke-windows

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - minimal
          - systems
          - proofs
          - ebpf
          - full
        container:
          - none
        # include:
        #   - profile: full
        #     container: wsl-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Provision WSL (Ubuntu)
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-22.04
          wsl-version: 2

      - name: Install dependencies in WSL
        shell: powershell
        run: |
          wsl sudo apt-get update
          wsl sudo apt-get install -y clang llvm bpftrace z3

      - name: Fetch vault branch
        run: git fetch origin vault:vault

      - name: Prepend container to test vault note
        if: matrix.container != 'none'
        shell: powershell
        run: |
          git checkout vault
          $content = Get-Content "Smoke Suite.md" -Raw
          $frontmatter = "---\r\nloom-container: ${{ matrix.container }}\r\n---\r\n\r\n"
          Set-Content -Path "Smoke Suite.md" -Value ($frontmatter + $content) -NoNewline
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "Prepend container frontmatter"
          git checkout -f -

      - run: npm ci --legacy-peer-deps

      - name: Run smoke tests
        shell: powershell
        run: |
          $env:LOOM_CHROME_PATH = "${{ steps.setup-chrome.outputs.chrome-path }}"
          npm run smoke -- --profile ${{ matrix.profile }} --require-pdf --require-all

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loom-smoke-windows-${{ matrix.profile }}-${{ matrix.container }}
          path: .loom/artifacts/smoke/${{ matrix.profile }}